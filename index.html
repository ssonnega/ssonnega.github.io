<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>US Ski Resort Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f0; color: #1a1a18; }

  /* HERO */
  .hero {
    position: relative;
    height: 260px;
    background: url('https://images.unsplash.com/photo-1700142572634-150b3857e71d?fm=jpg&q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
    display: flex; align-items: flex-end;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.65) 100%);
  }
  .hero-content {
    position: relative; z-index: 1;
    padding: 1.5rem 2rem;
    color: white;
  }
  .hero-content h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.5px; line-height: 1.2; }
  .hero-content p { font-size: 1rem; color: rgba(255,255,255,0.8); margin-top: 0.4rem; }
  .hero-stats { display: flex; gap: 1.5rem; margin-top: 0.8rem; }
  .hero-stat { font-size: 0.82rem; color: rgba(255,255,255,0.75); }
  .hero-stat strong { color: white; font-size: 1rem; display: block; }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 260px); min-height: 500px; }
  #sidebar { width: 310px; min-width: 270px; background: white; border-right: 1px solid #e0e0d8; display: flex; flex-direction: column; overflow: hidden; }
  #map { flex: 1; }

  /* SIDEBAR */
  .sidebar-header { padding: 1rem; border-bottom: 1px solid #e0e0d8; flex-shrink: 0; }
  .sidebar-header h2 { font-size: 0.88rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 0.75rem; }
  .filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .filter-group { display: flex; flex-direction: column; gap: 3px; }
  .filter-group.full { grid-column: 1 / -1; }
  .filter-group label { font-size: 0.72rem; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
  select { padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.82rem; background: white; width: 100%; }
  select:focus { outline: none; border-color: #4a90d9; }
  .range-row { display: flex; align-items: center; gap: 6px; }
  input[type=range] { flex: 1; }
  .range-val { font-size: 0.8rem; font-weight: 600; color: #333; min-width: 38px; text-align: right; }

  .legend { display: flex; gap: 10px; margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px solid #f0f0ea; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: #666; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* RESORT LIST */
  .list-meta { padding: 6px 1rem; background: #f8f8f4; border-bottom: 1px solid #eee; font-size: 0.75rem; color: #888; flex-shrink: 0; }
  .resort-list { flex: 1; overflow-y: auto; }
  .resort-card { padding: 0.6rem 1rem; border-bottom: 1px solid #f0f0ea; cursor: pointer; transition: background 0.1s; }
  .resort-card:hover { background: #f5f5f0; }
  .resort-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; }
  .resort-card h3 { font-size: 0.85rem; font-weight: 500; line-height: 1.3; }
  .resort-price { font-size: 0.88rem; font-weight: 600; white-space: nowrap; }
  .price-budget { color: #1a6e30; }
  .price-mid { color: #7a5500; }
  .price-expensive { color: #8b1a1a; }
  .resort-card .meta { font-size: 0.72rem; color: #999; margin-top: 2px; }

  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
  .badge-budget { background: #d4edda; color: #1a6e30; }
  .badge-mid { background: #fff3cd; color: #7a5500; }
  .badge-expensive { background: #fde8e8; color: #8b1a1a; }

  .no-results { padding: 2rem 1rem; color: #999; font-size: 0.85rem; text-align: center; }

  @media (max-width: 650px) {
    .hero { height: 180px; }
    .hero-content h1 { font-size: 1.3rem; }
    .layout { flex-direction: column; height: auto; }
    #sidebar { width: 100%; min-width: unset; max-height: 50vh; border-right: none; border-bottom: 1px solid #ddd; }
    #map { height: 55vw; min-height: 300px; }
  }
</style>
</head>

<div class="hero">

</div>

            <option value="West">West</option>
            <option value="Northeast">Northeast</option>
            <option value="Midwest">Midwest</option>
            <option value="Southeast">Southeast</option>
            <option value="Southwest">Southwest</option>
          </select>
        </div>
        <div class="filter-group">

          <select id="filter-pass">

            <option value="Ikon">Ikon</option>
            <option value="Indy">Indy</option>
            <option value="Powder Alliance">Powder Alliance</option>

            <option value="None">No major pass</option>

        </div>
        <div class="filter-group">

            <option value="Mid-Range">🟡 Mid-Range ($100–$160)</option>
            <option value="Expensive">🔴 Expensive ($160+)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>State</label>
          <select id="filter-state">
            <option value="">All states</option>
          </select>
        </div>
        <div class="filter-group full">

          <div class="range-row">
            <input type="range" id="filter-price" min="40" max="250" step="5" value="250" />
          </div>
        </div>
      </div>
      <div class="legend">

        <div class="legend-item"><span class="dot" style="background:#e6a817"></span>Mid $100–160</div>
        <div class="legend-item"><span class="dot" style="background:#d84040"></span>Expensive $160+</div>

    </div>
    <div class="list-meta" id="list-meta">Showing 150 resorts · sorted by price</div>
    <div class="resort-list" id="resort-list"></div>
  </div>
  <div id="map"></div>
</div>

function getTier(p) { return p < 100 ? "Budget" : p <= 160 ? "Mid-Range" : "Expensive"; }
function getColor(p) { return p < 100 ? "#2d9e5f" : p <= 160 ? "#e6a817" : "#d84040"; }
function getBadgeClass(t) { return t === "Budget" ? "badge-budget" : t === "Mid-Range" ? "badge-mid" : "badge-expensive"; }
function getPriceClass(t) { return t === "Budget" ? "price-budget" : t === "Mid-Range" ? "price-mid" : "price-expensive"; }

// Populate state dropdown
const states = [...new Set(resorts.map(r => r.state))].sort();
const stateEl = document.getElementById('filter-state');
states.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; stateEl.appendChild(o); });

// Hero stats
const budgetCount = resorts.filter(r => r.dayTicket < 100).length;
const stateCount = states.length;
document.getElementById('stat-total').textContent = resorts.length;
document.getElementById('stat-budget').textContent = budgetCount;
document.getElementById('stat-states').textContent = stateCount;

// Map
const map = L.map('map').setView([39.5, -98.35], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

const markers = {};
function makeIcon(p) {
  const c = getColor(p);
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${c};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

resorts.forEach(r => {
  const tier = getTier(r.dayTicket);
  const m = L.marker([r.lat, r.lng], { icon: makeIcon(r.dayTicket) }).addTo(map)
    .bindPopup(`<div style="min-width:200px">
      <strong style="font-size:0.95rem">${r.name}</strong><br>
      <span style="color:#666;font-size:0.8rem">${r.state} · ${r.region}</span>
      <hr style="margin:6px 0;border:none;border-top:1px solid #eee">
      <table style="font-size:0.82rem;width:100%">
        <tr><td style="color:#888">Day ticket</td><td style="text-align:right;font-weight:600;color:${getColor(r.dayTicket)}">$${r.dayTicket}</td></tr>
        <tr><td style="color:#888">Tier</td><td style="text-align:right">${tier}</td></tr>
        <tr><td style="color:#888">Vertical</td><td style="text-align:right">${r.vertical.toLocaleString()} ft</td></tr>
        <tr><td style="color:#888">Trails</td><td style="text-align:right">${r.trails > 0 ? r.trails : 'Glades only'}</td></tr>
        <tr><td style="color:#888">Pass</td><td style="text-align:right">${r.pass}</td></tr>
      </table>
      <p style="font-size:0.78rem;color:#666;margin-top:6px;font-style:italic">${r.notes}</p>
    </div>`);
  markers[r.name] = m;
});

function renderList(filtered) {
  const list = document.getElementById('resort-list');
  document.getElementById('list-meta').textContent =
    `Showing ${filtered.length} resort${filtered.length !== 1 ? 's' : ''} · sorted by price`;
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No resorts match your filters.<br>Try adjusting the criteria above.</div>';
    return;
  }
  const sorted = [...filtered].sort((a, b) => a.dayTicket - b.dayTicket);
  list.innerHTML = sorted.map(r => {
    const tier = getTier(r.dayTicket);
    return `<div class="resort-card" onclick="flyTo('${r.name.replace(/'/g,"\\'")}')">
      <div class="resort-card-top">
        <h3>${r.name}</h3>
        <span class="resort-price ${getPriceClass(tier)}">$${r.dayTicket}</span>
      </div>
      <div class="meta">${r.state} · ${r.vertical.toLocaleString()} ft · ${r.trails > 0 ? r.trails + ' trails' : 'Glades'} · <span class="badge ${getBadgeClass(tier)}">${tier}</span></div>
      <div class="meta" style="margin-top:2px">Pass: ${r.pass}</div>
    </div>`;
  }).join('');
}

window.flyTo = function(name) {
  const r = resorts.find(x => x.name === name);
  if (r) { map.flyTo([r.lat, r.lng], 10); markers[name].openPopup(); }
};

function applyFilters() {
  const region = document.getElementById('filter-region').value;
  const passF = document.getElementById('filter-pass').value;
  const tier = document.getElementById('filter-tier').value;
  const state = document.getElementById('filter-state').value;
  const maxP = parseInt(document.getElementById('filter-price').value);
  document.getElementById('range-label').textContent = '$' + maxP;

  const filtered = resorts.filter(r => {
    if (region && r.region !== region) return false;
    if (passF && r.pass !== passF) return false;
    if (tier && getTier(r.dayTicket) !== tier) return false;
    if (state && r.state !== state) return false;
    if (r.dayTicket > maxP) return false;
    return true;
  });

  // update markers
  resorts.forEach(r => {
    const show = filtered.includes(r);
    if (show && !map.hasLayer(markers[r.name])) markers[r.name].addTo(map);
    if (!show && map.hasLayer(markers[r.name])) map.removeLayer(markers[r.name]);
  });

  renderList(filtered);
}

['filter-region','filter-pass','filter-tier','filter-state'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('filter-price').addEventListener('input', applyFilters);

renderList(resorts);
</script>
